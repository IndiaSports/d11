}

/* button */
.btn {
    display: flex;
    align-items: center;

    gap: 10px;
    padding: 14px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 600;
    transition: 0.3s;
}

.btn:hover {
    background: #ff2c2c;
    color: white;
}

/* svg icon */
.icon {
    width: 20px;
    height: 20px;
    fill: currentColor;
}

/* footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
